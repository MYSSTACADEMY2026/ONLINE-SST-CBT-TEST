    function loadChapters() {
        const sc = document.getElementById("sClass").value;

        box.innerHTML = "";

    function renderMeta(targetId, score = null) {

const today = new Date();
const d = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        let chapterList = selectedChaps.map(ch => `<li>${ch}</li>`).join('');
        const html = `
            <div class="details-box">
                <strong>Candidate:</strong> ${document.getElementById("sName").value} | 
                <strong>Roll:</strong> ${document.getElementById("sRoll").value} | 
                <strong>Class:</strong> ${document.getElementById("sClass").value} |

            <div class="chapter-box-ui">
                <strong>SELECTED CHAPTERS:</strong>

        document.getElementById(targetId).innerHTML = html;

    function startTest() {
        selectedChaps = Array.from(document.querySelectorAll(".chCheck:checked")).map(el => el.value);
        let pool = [];
        selectedChaps.forEach(ch => pool = pool.concat(questionBank[document.getElementById("sClass").value][ch]));
        selectedQuestions = pool.sort(() => Math.random() - 0.5).slice(0, 20);
        renderMeta("metaBox");
        document.getElementById("setupSection").classList.add("hide");
        document.getElementById("examSection").classList.remove("hide");
        visited.add(0); // Mark first question visited
        renderQ(); updateNav(); startTimer();
    }

    function renderQ() {
        const q = selectedQuestions[currentIdx];
        const userAns = document.querySelector(`input[name="q${currentIdx}"]`)?.value;
        let html = `<h3>Question ${currentIdx + 1}</h3><p>${q.question}</p>`;
        q.options.forEach(opt => {
            let checked = (userAns === opt) ? 'checked' : '';
            html += `<label style="display:block; padding:10px; border:1px solid #ddd; margin:5px 0;"><input type="radio" name="mainQ" value="${opt}" ${checked} onchange="saveAns('${opt}')"> ${opt}</label>`;
        });
        document.getElementById('qDisplay').innerHTML = html;
    }

    function saveAns(val) {
        let hidden = document.querySelector(`input[name="q${currentIdx}"]`) || document.createElement('input');
        hidden.type = 'radio'; hidden.name = 'q'+currentIdx; hidden.value = val; hidden.checked = true; hidden.className = 'hide';
        document.body.appendChild(hidden); updateNav();
    }

    function updateNav() {
        let html = "";
        selectedQuestions.forEach((q, i) => {
            let isAnswered = document.querySelector(`input[name="q${i}"]:checked`);
            let status = isAnswered ? 'answered' : (visited.has(i) ? 'visited' : 'unanswered');
            html += `<div class="q-nav ${status}" onclick="visitQ(${i})">${i+1}</div>`;
        });
        html += `
            <div class="legend">
                <div class="leg-item"><div class="box" style="border:2px solid #dc3545"></div> Unans</div>
                <div class="leg-item"><div class="box" style="background:#28a745"></div> Ans</div>
                <div class="leg-item"><div class="box" style="background:#fd7e14"></div> Visited</div>
            </div>`;
        document.getElementById('qMap').innerHTML = html;
    }

    function visitQ(i) { visited.add(i); currentIdx = i; renderQ(); updateNav(); }
    function nextQ() { if(currentIdx < selectedQuestions.length - 1) { currentIdx++; visited.add(currentIdx); renderQ(); updateNav(); } }
    function prevQ() { if(currentIdx > 0) { currentIdx--; visited.add(currentIdx); renderQ(); updateNav(); } }

    function startTimer() {
        let t = 1500;
        let timer = setInterval(() => { t--; document.getElementById("timerDisplay").innerText = `Time: ${Math.floor(t/60)}:${t%60}`; if(t<=0) { clearInterval(timer); submitExam(); } }, 1000);
    }

    function submitExam() {
        userScore = 0;
        let report = "";
        selectedQuestions.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`)?.value;
            if(sel === q.answer) userScore++;
            report += `<div style="margin-bottom:15px; border-bottom:1px solid #ccc;"><strong>Q${i+1}: ${q.question}</strong><br>Your Answer: <span style="color:${sel==q.answer?'green':'red'}">${sel || 'Not Answered'}</span> | Correct: ${q.answer}</div>`;
        });
        renderMeta("finalMeta", userScore);
        document.getElementById("finalReport").innerHTML = report;
        const data = { name: document.getElementById("sName").value, roll: document.getElementById("sRoll").value, class: document.getElementById("sClass").value, chapters: selectedChaps.join(', '), score: userScore + "/20", set: setCode };
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
        document.getElementById("examUI").classList.add("hide");
        document.getElementById("resultSection").classList.remove("hide");
    }

    function downloadHTML() {
        const blob = new Blob([document.getElementById('reportContent').outerHTML], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'SST_Scorecard.html'; a.click();
    }
