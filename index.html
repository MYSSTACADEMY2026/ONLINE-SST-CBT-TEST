    <style>
        :root { --primary: #0b5ea8; --danger: #dc3545; }

        .cbt-header { 
            background: linear-gradient(180deg, #0b5ea8 0%, #314755 55%, #26a0da 100%); 
            color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #000; 
        }
        .cbt-workspace { display: flex; flex: 1; overflow: hidden; }
        .canvas { flex: 1; padding: 40px; overflow-y: auto; background: #fff; }
        .sidebar { width: 300px; background: #fff; border-left: 2px solid #ccc; padding: 20px; overflow-y: auto; }

        /* Boxes */
        .details-box { background: #ffffff; border: 2px solid var(--primary); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chapter-box-ui { background: #eef6ff; border: 2px dashed var(--primary); padding: 15px; margin-bottom: 20px; font-weight: bold; }

        /* Pill Navigation Group */
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .tablet-group { display: flex; border: 2px solid var(--primary); border-radius: 50px; overflow: hidden; background: white; }
        .btn-nav { padding: 12px 30px; cursor: pointer; border: none; background: white; color: var(--primary); font-weight: bold; transition: all 0.3s; }
        .btn-nav:first-child { border-right: 1px solid var(--primary); }
        .btn-nav:hover:not(:disabled) { background: var(--primary); color: white; }
        .btn-nav:disabled { background: #e0e0e0 !important; color: #aaa; cursor: not-allowed; }

        /* Submit Button (Red Pill) */
        .btn-submit { 
            padding: 12px 30px; cursor: pointer; border: 2px solid var(--danger); 
            background: white; color: var(--danger); text-transform: uppercase; 
            font-weight: bold; border-radius: 50px; transition: all 0.3s;
        }
        .btn-submit:hover { background: var(--danger); color: white; }

        /* Progress Boxes */
        .q-nav { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; margin: 3px; cursor: pointer; border: 2px solid #ccc; font-weight: bold; transition: 0.2s; }
        .q-nav:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .unanswered { border-color: #dc3545; color: #dc3545; }
        .answered { background: #28a745; color: white; border-color: #28a745; }
        .visited { background: #fd7e14; color: white; border-color: #fd7e14; }
        
        .legend { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 15px; font-size: 14px; }
        .leg-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .box { width: 18px; height: 18px; border: 2px solid #000; }
        
        .btn { padding: 12px 25px; cursor: pointer; border: none; background: #000; color: white; margin-top: 10px; text-transform: uppercase; }
        .hide { display: none; }
    </style>
</head>

let selectedQuestions = [], currentIdx = 0, selectedChaps = [], setCode = "SET-" + Math.floor(Math.random() * 1000), userScore = 0;
    let visited = new Set();

    function loadChapters() {
        const sc = document.getElementById("sClass").value;
        const box = document.getElementById("chapterBox");
        box.innerHTML = "";
        if(questionBank[sc]) {
            box.innerHTML += `<label style="font-weight:bold; color:#0b5ea8; cursor:pointer;"><input type="checkbox" id="selectAllChaps" onclick="toggleAll(this)"> SELECT ALL CHAPTERS</label><hr>`;
            Object.keys(questionBank[sc]).forEach(ch => box.innerHTML += `<label><input type="checkbox" class="chCheck" value="${ch}"> ${ch}</label><br>`);
        }
    }

    function toggleAll(source) { document.querySelectorAll('.chCheck').forEach(checkbox => checkbox.checked = source.checked); }

function renderMeta(targetId, score = null) {
    const d = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    
    // 1. Get the new input value
    const section = document.getElementById("sSection").value;
    
    let chapterList = selectedChaps.map(ch => `<li style="margin-bottom: 4px;">${ch}</li>`).join('');
    
    document.getElementById(targetId).innerHTML = `
        <div class="details-box"> 
            <strong>Candidate:</strong> ${document.getElementById("sName").value} | 
            <strong>Roll:</strong> ${document.getElementById("sRoll").value} | 
            
            <strong>Section:</strong> ${section.toUpperCase()} | 
            
            <strong>Class:</strong> ${document.getElementById("sClass").value} | 
            <strong>Date:</strong> ${d} | 
            <strong>Set:</strong> ${setCode} 
            ${score !== null ? `<br><strong>Marks Secured:</strong> ${score}/20` : ''} 
        </div>
        <div class="chapter-box-ui"> 
            <strong>SELECTED CHAPTERS:</strong> 
            <ul style="margin: 10px 0 0 0; padding-left: 25px; list-style-type: disc;"> 
                ${chapterList} 
            </ul> 
        </div>`;
}

    function startTest() {
        selectedChaps = Array.from(document.querySelectorAll(".chCheck:checked")).map(el => el.value);
        let pool = [];
        selectedChaps.forEach(ch => pool = pool.concat(questionBank[document.getElementById("sClass").value][ch]));
        selectedQuestions = pool.sort(() => Math.random() - 0.5).slice(0, 20);
        renderMeta("metaBox");
        document.getElementById("setupSection").classList.add("hide");
        document.getElementById("examSection").classList.remove("hide");
        visited.add(0);
        renderQ(); updateNav(); startTimer();
    }

    function renderQ() {
        const q = selectedQuestions[currentIdx];
        const userAns = document.querySelector(`input[name="q${currentIdx}"]`)?.value;
        let html = `<h3>Question ${currentIdx + 1}</h3><p>${q.question}</p>`;
        q.options.forEach(opt => {
            html += `<label style="display:block; padding:10px; border:1px solid #ddd; margin:5px 0;"><input type="radio" name="mainQ" value="${opt}" ${(userAns === opt) ? 'checked' : ''} onchange="saveAns('${opt}')"> ${opt}</label>`;
        });
        document.getElementById('qDisplay').innerHTML = html;
    }

    function saveAns(val) {
        let hidden = document.querySelector(`input[name="q${currentIdx}"]`) || document.createElement('input');
        hidden.type = 'radio'; hidden.name = 'q'+currentIdx; hidden.value = val; hidden.checked = true; hidden.className = 'hide';
        document.body.appendChild(hidden); updateNav();
    }

    function updateNav() {
        let html = "";
        selectedQuestions.forEach((q, i) => {
            let isAnswered = document.querySelector(`input[name="q${i}"]:checked`);
            html += `<div class="q-nav ${isAnswered ? 'answered' : (visited.has(i) ? 'visited' : 'unanswered')}" onclick="visitQ(${i})">${i+1}</div>`;
        });
        html += `<div class="legend"><div class="leg-item"><div class="box" style="border:2px solid #dc3545"></div> Unanswered</div><div class="leg-item"><div class="box" style="background:#28a745"></div> Answered</div><div class="leg-item"><div class="box" style="background:#fd7e14"></div> Visited</div></div>`;
        document.getElementById('qMap').innerHTML = html;
        document.getElementById('prevBtn').disabled = (currentIdx <= 0);
        document.getElementById('nextBtn').disabled = (currentIdx >= selectedQuestions.length - 1);
    }

    function visitQ(i) { visited.add(i); currentIdx = i; renderQ(); updateNav(); }
    function nextQ() { if(currentIdx < selectedQuestions.length - 1) { currentIdx++; visited.add(currentIdx); renderQ(); updateNav(); } }
    function prevQ() { if(currentIdx > 0) { currentIdx--; visited.add(currentIdx); renderQ(); updateNav(); } }

    function startTimer() {
        let t = 1500;
        let timer = setInterval(() => { t--; document.getElementById("timerDisplay").innerText = `Time: ${Math.floor(t/60)}:${t%60}`; if(t<=0) { clearInterval(timer); submitExam(); } }, 1000);
    }
function submitExam() {
    userScore = 0;
    let report = "";
    
    // 1. Calculate Score
    selectedQuestions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`)?.value;
        if(sel === q.answer) userScore++;
        
        let optionsHTML = q.options.map(opt => {
            let color = (opt === q.answer) ? "green" : (opt === sel && sel !== q.answer ? "red" : "black");
            let weight = (opt === q.answer || opt === sel) ? "bold" : "normal";
            return `<div style="color:${color}; font-weight:${weight}; margin-bottom:2px;">
                ${opt === sel ? '➤ ' : '○ '} ${opt} ${opt === q.answer ? '[Correct Answer]' : ''}
            </div>`;
        }).join('');

        report += `<div style="margin-bottom:20px; border-bottom:1px solid #ccc; padding-bottom:10px;">
            <strong>Q${i+1}: ${q.question}</strong><br>${optionsHTML}
        </div>`;
    });

    renderMeta("finalMeta");
    
    const pillStyle = "background: #eef6ff; border: 1px solid #0b5ea8; padding: 12px 25px; border-radius: 30px; font-size: 18px; font-weight: bold; color: #0b5ea8; display: inline-block; margin: 8px;";
    
    document.getElementById("finalMeta").innerHTML = `
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #0b5ea8; margin-bottom: 20px; text-decoration: underline;">ONLINE CBT TEST RESULT</h2>
            <div style="${pillStyle}">Candidate: ${document.getElementById("sName").value}</div>
            <div style="${pillStyle}">Roll: ${document.getElementById("sRoll").value}</div>
            <div style="${pillStyle}">Section: ${document.getElementById("sSection").value.toUpperCase()}</div>
            <div style="${pillStyle}">Class: ${document.getElementById("sClass").value}</div>
            <div style="${pillStyle}">Date: ${new Date().toLocaleDateString('en-GB')}</div>
            <div style="${pillStyle}">Set: ${setCode}</div>
        </div>
        <div class="chapter-box-ui" style="margin-bottom: 20px; padding: 15px; border: 1px dashed #0b5ea8; background: #f9f9f9;">
            <strong style="color:#0b5ea8;">SELECTED CHAPTERS:</strong>
            <ul style="margin: 10px 0 0 0; padding-left: 25px; list-style-type: disc;">
                ${selectedChaps.map(ch => `<li>${ch}</li>`).join('')}
            </ul>
        </div>
        <div style="text-align: center; margin: 20px 0; padding: 20px; border: 3px solid #dc3545; border-radius: 10px;">
            <div style="font-size: 20px; color: #dc3545;">MARKS SECURED</div>
            <div style="font-size: 48px; font-weight: bold; color: #dc3545;">${userScore}/20</div>
        </div>`;
    
    document.getElementById("finalReport").innerHTML = report;

    // Send to Google Sheets
    fetch(GOOGLE_SCRIPT_URL, { 
        method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, 
        body: JSON.stringify({ 
            name: document.getElementById("sName").value, 
            roll: document.getElementById("sRoll").value, 
            section: document.getElementById("sSection").value,
            class: document.getElementById("sClass").value, 
            score: userScore + "/20", 
            set: setCode,
            chapters: selectedChaps.map(c => "• " + c).join('\n') 
        }) 
    }).catch(e => console.error(e));

    document.getElementById("examUI").classList.add("hide");
    document.getElementById("resultSection").classList.remove("hide");
}
